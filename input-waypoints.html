<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Геоданные и аэронавигационные точки</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar__brand">
        <h1>Планирование миссии</h1>
      </div>
      <nav class="nav-section">
        <div class="nav-section__title">Входы</div>
        <a href="input-mission-request.html">Заявка на миссию</a>
        <a href="input-cartography.html">Картографические данные</a>
        <a href="input-weather.html">Погодные данные</a>
        <a href="input-waypoints.html" class="active">Геоданные и точки</a>
      </nav>
      <nav class="nav-section">
        <div class="nav-section__title">Выходы</div>
        <a href="output-mission-plan.html">План миссии</a>
        <a href="output-route-adjustments.html">Корректировки маршрута</a>
        <a href="output-mission-report.html">Отчёт о выполнении</a>
        <a href="output-analytics.html">Аналитическая сводка</a>
      </nav>
    </aside>
    <main class="main">
      <div class="page-header">
        <h2>Геоданные и аэронавигационные точки</h2>
      </div>
      <div class="card">
        <h3 class="card__title">Точка маршрута</h3>
        <form class="form-grid form-grid--2">
          <div>
            <label for="lat">Широта</label>
            <input type="number" id="lat" name="latitude" step="any" placeholder="55.7558" />
          </div>
          <div>
            <label for="lon">Долгота</label>
            <input type="number" id="lon" name="longitude" step="any" placeholder="37.6173" />
          </div>
          <div>
            <label for="alt">Высота (м, MSL или по СК карты)</label>
            <input type="number" id="alt" name="altitude" step="1" placeholder="120" />
          </div>
        </form>
        <div class="btn-row">
          <button type="button" class="btn btn-primary">Добавить точку в набор</button>
          <a class="btn btn-ghost" href="index.html">На обзор</a>
        </div>
      </div>
      <div class="card">
        <h3 class="card__title">Таблица точек (макет)</h3>
        <table class="attr-table">
          <thead>
            <tr><th>#</th><th>Широта</th><th>Долгота</th><th>Высота</th></tr>
          </thead>
          <tbody>
            <tr><td>1</td><td>—</td><td>—</td><td>—</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
</body>
</html>
