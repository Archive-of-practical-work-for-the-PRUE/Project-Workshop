<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Заявка на миссию</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar__brand">
          <h1>Планирование миссии</h1>
        </div>
        <nav class="nav-section">
          <div class="nav-section__title">Входы</div>
          <a href="input-mission-request.html" class="active"
            >Заявка на миссию</a
          >
          <a href="input-cartography.html">Картографические данные</a>
          <a href="input-weather.html">Погодные данные</a>
          <a href="input-waypoints.html">Геоданные и точки</a>
        </nav>
        <nav class="nav-section">
          <div class="nav-section__title">Выходы</div>
          <a href="output-mission-plan.html">План миссии</a>
          <a href="output-route-adjustments.html">Корректировки маршрута</a>
          <a href="output-mission-report.html">Отчёт о выполнении</a>
          <a href="output-analytics.html">Аналитическая сводка</a>
        </nav>
      </aside>
      <main class="main">
        <div class="topbar">
          <a class="btn btn-primary" href="../drone-swarm-sim/index.html">Демонстрация</a>
        </div>
        <div class="page-header">
          <h2>Заявка на миссию</h2>
        </div>
        <div class="card">
          <h3 class="card__title">Реквизиты миссии</h3>
          <form class="form-grid form-grid--2">
            <div>
              <label for="m-name">Название</label>
              <input
                type="text"
                id="m-name"
                name="name"
                placeholder="Напр. PATROL-NORTH-042"
              />
            </div>
            <div></div>
            <div style="grid-column: 1 / -1">
              <label for="m-desc">Описание</label>
              <textarea
                id="m-desc"
                name="description"
                placeholder="Цели, ограничения, примечания…"
              ></textarea>
            </div>
            <div>
              <label for="m-start">Плановое время начала</label>
              <input type="datetime-local" id="m-start" name="planned_start" />
            </div>
            <div>
              <label for="m-end">Плановое время окончания</label>
              <input type="datetime-local" id="m-end" name="planned_end" />
            </div>
          </form>
          <div class="btn-row">
            <button type="button" class="btn btn-primary">
              Отправить заявку
            </button>
            <a class="btn btn-ghost" href="../index.html">На обзор</a>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
